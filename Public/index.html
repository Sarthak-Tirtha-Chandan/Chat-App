<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hangout Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                500: '#4f46e5',
                600: '#4338ca',
                700: '#3730a3'
              }
            }
          }
        }
      }
    </script>
  </head>
  <body class="m-0 bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50 text-slate-800">
    <div class="h-screen overflow-hidden bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50">
      <section class="flex h-full flex-col bg-white">
        <header class="fixed inset-x-0 top-0 z-20 flex-shrink-0 border-b border-slate-200 bg-gradient-to-r from-brand-500 via-indigo-600 to-purple-700 px-6 py-4 text-white">
          <h1 class="text-lg font-semibold">Chat</h1>
          <p class="text-sm text-blue-100">Connect with your friends</p>
        </header>

        <div id="messages" class="flex-1 overflow-y-auto bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50 p-4 pt-20 pb-24 sm:p-6 sm:pt-20 sm:pb-24"></div>

        <form id="chat-form" class="fixed inset-x-0 bottom-0 z-20 flex gap-2 border-t border-slate-200 bg-white p-4 sm:p-6">
          <input
            type="text"
            id="msg"
            placeholder="Type a message..."
            class="flex-1 rounded-full border border-slate-300 px-4 py-3 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20"
          />
          <button
            id="send"
            type="submit"
            class="rounded-full bg-gradient-to-r from-brand-500 via-indigo-600 to-purple-700 px-4 py-3 text-sm font-semibold text-white"
          >
            Send
          </button>
        </form>
      </section>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const form = document.getElementById('chat-form');
      const input = document.getElementById('msg');
      const messagesEl = document.getElementById('messages');

      function escapeHtml(text) {
        return text
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function addMessage(text, type = 'other') {
        const wrapper = document.createElement('div');
        wrapper.className = `flex ${type === 'mine' ? 'justify-end' : 'justify-start'} mb-3`;

        const bubble = document.createElement('div');
        bubble.className = `max-w-[80%] rounded-2xl px-4 py-3 shadow-sm ${
          type === 'mine'
            ? 'bg-gradient-to-r from-brand-500 via-indigo-600 to-purple-700 text-white'
            : 'bg-white text-slate-700'
        }`;
        bubble.innerHTML = `
          <p class="m-0 leading-6">${escapeHtml(text)}</p>
          <span class="mt-1 block text-[11px] opacity-80">${new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })}</span>
        `;

        wrapper.appendChild(bubble);
        messagesEl.appendChild(wrapper);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      socket.on('message', (message) => {
        addMessage(message, 'other');
      });

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const message = input.value.trim();

        if (!message) return;

        socket.emit('message', message);
        addMessage(message, 'mine');
        input.value = '';
        input.focus();
      });
    </script>
  </body>
</html>
